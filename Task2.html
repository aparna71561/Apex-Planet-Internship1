<!DOCTYPE html>
<html>
<head>
    <title>Simple Internship Task</title>
    <style>
        /* TASK 3: Layout (Flexbox & Grid) */
        body { font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .nav { display: flex; justify-content: space-around; width: 100%; background: #333; color: rgb(255, 255, 255); padding: 10px; margin-bottom: 20px; }

        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Two columns side by side */
            gap: 20px; 
            width: 100%; 
            max-width: 800px; 
        }

        /* Responsive: stack columns on small screens */
        @media (max-width: 600px) { .container { grid-template-columns: 1fr; } }

        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input { display: block; width: 90%; margin: 10px 0; padding: 8px; }
        button { cursor: pointer; padding: 8px 15px; background: #28a745; color: white; border: none; }
        .error { color: red; font-size: 12px; }
    </style>
</head>
<body>

    <div class="nav">
        <strong>WebPage</strong>
        <span>Home | About</span>
    </div>

    <div class="container">
        
        <div class="box">
            <h3>Contact Form</h3>
            <form id="myForm">
                <input type="text" id="name" placeholder="Name">
                <div id="nameErr" class="error"></div>
                
                <input type="text" id="email" placeholder="Email">
                <div id="emailErr" class="error"></div>
                
                <button type="submit">Submit</button>
            </form>
        </div>

        <div class="box">
            <h3>To-Do List</h3>
            <input type="text" id="taskInput" placeholder="New Task...">
            <button onclick="addTask()">Add</button>
            <ul id="list"></ul>
        </div>

    </div>
<img src="todo-list-illustration.avif" width="300" alt="todo-list-illustration image">
    <script>
        // FORM VALIDATION
        document.getElementById('myForm').onsubmit = function(e) {
            e.preventDefault();
            let name = document.getElementById('name').value;
            let email = document.getElementById('email').value;
            let valid = true;

            document.getElementById('nameErr').innerText = name == "" ? "Required" : "";
            document.getElementById('emailErr').innerText = !email.includes("@") ? "Invalid Email" : "";
            
            if(name != "" && email.includes("@")) alert("Success!");
        };

        // TO-DO LIST (DOM Manipulation)
        function addTask() {
            let val = document.getElementById('taskInput').value;
            if(val == "") return;

            let li = document.createElement('li');
            li.innerHTML = val + " <button onclick='this.parentElement.remove()'>x</button>";
            document.getElementById('list').appendChild(li);
            document.getElementById('taskInput').value = "";
        }
    </script>

</body>
</html>
