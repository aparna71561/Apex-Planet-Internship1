<!DOCTYPE html>
<html>
<head>
    <title>My Simple Webpage</title>

    <!-- CSS Styling -->
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h1{
            color: rgb(167, 35, 167);
        }

        p{
            font-size: 18px;
        }

        button{
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
<style>
        button:hover{
            background-color: darkgreen;
        }
    .highlight{
    color: rgb(213, 82, 104);
    font-weight: bold;
    font-size: 20px;
}
    </style>
</head>

<body>

    <!-- HTML Content -->
    <h1>Welcome to My 1st Webpage</h1>
    <p class="highlight">“Hello, I am Aparna. I developed this webpage using HTML, CSS, and JavaScript as part of my first task assigned by ApexPlanet to demonstrate the basics of web development.”</p>

    <img src="Welcome.avif" width="300" alt="Welcome Image">

    <!-- Button for JavaScript -->
    <button onclick="showMessage()">Click Me</button>

    <!-- JavaScript -->
    <script>
        function showMessage(){
            alert("Hello! Welcome to my webpage.");
        }
    </script>

</body>
</html>
